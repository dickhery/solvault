openapi: 3.0.0
info:
  title: Wallet API
  version: 1.0.0
  description: Additional wallet endpoints
paths:
  /simulations:
    post:
      summary: Simulate a transaction
      operationId: simulateTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateTransactionRequest'
      responses:
        '200':
          description: Simulation successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResult'
        '400':
          description: Bad Request - Invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    SimulateTransactionRequest:
      type: object
      required:
        - transaction
        - organizationId
        - walletId
      properties:
        transaction:
          type: array
          items:
            type: integer
            format: int32
            minimum: 0
          description: Transaction bytes
        organizationId:
          type: string
          format: uuid
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        walletId:
          type: string
          format: uuid
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        derivationInfo:
          oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/DerivationInfo'
    DerivationInfo:
      type: object
      required:
        - curve
        - derivationPath
        - addressFormat
      properties:
        curve:
          type: string
          enum: [Ed25519, Secp256k1]
        derivationPath:
          type: string
          example: m/44'/501'/0'/0'
        addressFormat:
          type: string
          enum: [Ethereum, Solana, BitcoinSegwit, Sui]
    SimulationResult:
      type: object
      properties:
        success:
          type: boolean
        simulationId:
          type: string
        logs:
          type: array
          items:
            type: string
        unitsConsumed:
          type: integer
        error:
          type: string
          nullable: true
      required:
        - success
        - simulationId
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        requestId:
          type: string
      required:
        - error
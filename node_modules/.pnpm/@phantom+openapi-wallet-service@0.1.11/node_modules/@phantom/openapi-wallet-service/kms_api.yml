      - oneOf:
        - $ref: '#/components/schemas/ExternalKmsAuthenticator'
        title: Authenticator
      - allOf:
        - $ref: '#/components/schemas/ExternalKmsWallet'
        - $ref: '#/components/schemas/ExternalWalletAccounts'
        title: Kms Wallet with Derived Accounts
      - type: object
        title: Organization to Wallet
        required:
        - organizationId
        - walletId
        - organizationPolicy
        properties:
          deletedAtMs:
            type:
            - integer
            - 'null'
            format: int64
            minimum: 0
          organizationId:
            type: string
            example: e5e42136-74b1-49ea-88b8-741c268a6f1a
          organizationPolicy:
            $ref: '#/components/schemas/VersionedOrganizationPolicy'
          policyName:
            type:
            - string
            - 'null'
          transactionPolicy:
            oneOf:
            - type: 'null'
            - $ref: '#/components/schemas/VersionedTransactionPolicy'
          walletId:
            type: string
            example: e5e42136-74b1-49ea-88b8-741c268a6f1a
      - allOf:
        - $ref: '#/components/schemas/SignedTransaction'
        - type: object
          required:
          - address
          - publicKey
          properties:
            address:
              type: string
              example: AnT3fqrEPSH1poYFNXVvcjoSVgttn2HwURUZoWM8FJv8
            publicKey:
              type: string
              example: 5hmEUbKqQ5cXLtvf4RSaZxmfHxzSMx1YLNYaGjjLqZe3Mh5LCdZfZpLGUn7SDyRaZHLHJCuYMWxaV5TmeDfQf3Vq
        title: Signed transaction with Public Key
      - type: object
        title: Signature with Public Key
        required:
        - signature
        - address
        - publicKey
        properties:
          address:
            type: string
            example: AnT3fqrEPSH1poYFNXVvcjoSVgttn2HwURUZoWM8FJv8
          publicKey:
            type: string
            example: 5hmEUbKqQ5cXLtvf4RSaZxmfHxzSMx1YLNYaGjjLqZe3Mh5LCdZfZpLGUn7SDyRaZHLHJCuYMWxaV5TmeDfQf3Vq
          signature:
            type: string
            example: 5hmEUbKqQ5cXLtvf4RSaZxmfHxzSMx1YLNYaGjjLqZe3Mh5LCdZfZpLGUn7SDyRaZHLHJCuYMWxaV5TmeDfQf3Vq
      - type: object
        title: Organization Wallets
        required:
        - wallets
        - totalCount
        - limit
        - offset
        properties:
          limit:
            type: integer
            format: int32
            minimum: 0
          offset:
            type: integer
            format: int32
            minimum: 0
          totalCount:
            type: integer
            format: int32
            minimum: 0
          wallets:
            type: array
            items:
              $ref: '#/components/schemas/ExternalKmsWallet'
      - type: object
        title: Wallet Access Grants
        required:
        - grants
        - totalCount
        - limit
        - offset
        properties:
          grants:
            type: array
            items:
              $ref: '#/components/schemas/ExternalOrganizationToWallet'
          limit:
            type: integer
            format: int32
            minimum: 0
          offset:
            type: integer
            format: int32
            minimum: 0
          totalCount:
            type: integer
            format: int32
            minimum: 0
      - type: array
        title: Derived Accounts
        items:
          $ref: '#/components/schemas/ExternalDerivedAccount'
      - oneOf:
        - $ref: '#/components/schemas/ImportEnvelope'
        title: Import Envelope
      - type: object
        title: Encrypted Bundle (either mnemonic entropy or keypair)
        required:
        - encryptedBundle
        properties:
          encryptedBundle:
            type: string
            example: c2FtcGxl...
    KmsRpcRequest:
      allOf:
      - $ref: '#/components/schemas/KmsRpcRequestParams'
      - type: object
        required:
        - timestampMs
        properties:
          timestampMs:
            type: integer
            format: int64
            example: 1751963009884
            minimum: 0
      example:
        method: signTransaction
        timestampMs: 1751963009884
        params:
          transaction: base64UrlSafeEncodedTransaction
          organizationId: e5e42136-74b1-49ea-88b8-741c268a6f1a
          walletId: f6f52247-85c2-5afb-99c9-852d379a7g2b

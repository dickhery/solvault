    KmsRpcResponseV2:
      oneOf:
      - $ref: '#/components/schemas/KmcRpcResponseV2Result'
      - $ref: '#/components/schemas/KmcRpcResponseV2Error'
    MnemonicWalletParameters:
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/DerivationInfoSchema'
        mnemonicLength:
          type: integer
          format: int32
          default: 24
          example: 24
          minimum: 0
    NoAddressLookupTables:
      description: |-
        Rule to disallow address table lookups in transactions, to prevent malicious actors from
        tampering with the address lookup table after the transaction has been signed.
      default: null
    NoSignerAccountUsage:
      type: object
      description: Rule to prevent using signer accounts in transactions.
      properties:
        allowlist:
          type: array
          items:
            $ref: '#/components/schemas/InstructionMatcher'
    OrganizationPolicyV0:
      type: object
      required:
      - scopes
      properties:
        derivationAllowlist:
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/DerivationInfoSchema'
          description: |-
            Allowlist of derivation paths that can be used with this policy.
            None means no restrictions.
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationWalletScope'
          description: Scopes that this policy is allowed to perform.
    OrganizationPolicyV1:
      allOf:
      - $ref: '#/components/schemas/ExternalCelPolicy'
      - type: object
        required:
        - rootAccess
        properties:
          rootAccess:
            $ref: '#/components/schemas/OrganizationRootAccess'
    OrganizationRootAccess:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - ALWAYS
      - type: object
        required:
        - timestampMs
        - type
        properties:
          timestampMs:
            type: integer
            format: int64
            minimum: 0
          type:
            type: string
            enum:
            - AFTER_TIMESTAMP
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - NONE
    OrganizationWalletScope:
      type: string
      enum:
      - owner
      - signaturePayload
      - signatureTransaction
      - ethereumSignMessage
      - ethereumSignTypedData
      - exportWallet
    PartialKmsAuthenticator:
      allOf:
      - $ref: '#/components/schemas/ExternalKmsAuthenticatorData'
      - type: object
        required:
        - authenticatorName
        properties:
          authenticatorName:
            type: string
            example: API Key Auth
          expiresInMs:
            type:
            - integer
            - 'null'
            format: int64
            minimum: 0
    PartialKmsUser:
      type: object
      required:
      - username
      - policy
      - authenticators
      properties:
        authenticators:
          type: array
          items:
            $ref: '#/components/schemas/PartialKmsAuthenticator'
        expiresInMs:
          type:
          - integer
          - 'null'
          format: int64
          minimum: 0
        policy:
          $ref: '#/components/schemas/UserPolicy'
        traits:
          type: object
          additionalProperties:
            type: string
          propertyNames:
            type: string
        username:
          type: string
    PasskeyRegistration:
      type: object
      required:
      - credentialId
      - attestationObject
      - clientDataJSON
      properties:
        attestationObject:
          type: string
          description: The attestation object, as binary.
          example: 5hmEUbKqQ5cXLtvf4RSaZxmfHxzSMx1YLNYaGjjLqZe3Mh5LCdZfZpLGUn7SDyRaZHLHJCuYMWxaV5TmeDfQf3Vq
        clientDataJSON:
          type: string
          description: The client data JSON, as binary.
          example: 5hmEUbKqQ5cXLtvf4RSaZxmfHxzSMx1YLNYaGjjLqZe3Mh5LCdZfZpLGUn7SDyRaZHLHJCuYMWxaV5TmeDfQf3Vq
        credentialId:
          type: string
          example: 5hmEUbKqQ5cXLtvf4RSaZxmfHxzSMx1YLNYaGjjLqZe3Mh5LCdZfZpLGUn7SDyRaZHLHJCuYMWxaV5TmeDfQf3Vq
        transports:
          type:
          - array
          - 'null'
          items:
            type: string
          description: The transports used by the authenticator.
    ReverseRule_InstructionAllowlist:
      type: object
      description: Rule to allow only specific instructions to be called on specific programs.
      required:
      - instructions
      properties:
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/InstructionMatcher'
    RevokeOrganizationAccessRequest:
      type: object
      required:
      - ownerOrganizationId
      - targetOrganizationId
      - walletId
      properties:
        ownerOrganizationId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        targetOrganizationId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        targetPolicyName:
          type:
          - string
          - 'null'
          description: |-
            If provided, remove the access grant with this specific policy name. If not provided,
            default grant will be removed, which is the one without a policy name. Note that it
            might mean that there are still other grants to the same target organization.
        walletId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
    SignRawPayloadRequest:
      type: object
      required:
      - payload
      - organizationId
      - walletId
      - algorithm
      properties:
        algorithm:
          $ref: '#/components/schemas/Algorithm'
        derivationInfo:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/DerivationInfoSchema'
        organizationId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        payload:
          type: string
          description: Base64-encoded payload to sign
          example: BAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
        policyName:
          type:
          - string
          - 'null'
        walletId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
    SignTransactionRequest:
      type: object
      required:
      - transaction
      - organizationId
      - walletId
      properties:
        derivationInfo:
          $ref: '#/components/schemas/DerivationInfoSchema'
        organizationId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        policyName:
          type:
          - string
          - 'null'
        transaction:
          $ref: '#/components/schemas/UnsignedTransaction'
        walletId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
    SignUtf8MessageRequest:
      type: object
      required:
      - message
      - organizationId
      - walletId
      - derivationInfo
      - algorithm
      properties:
        algorithm:
          $ref: '#/components/schemas/Algorithm'
        derivationInfo:
          $ref: '#/components/schemas/DerivationInfoSchema'
        message:
          type: string
        organizationId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        policyName:
          type:
          - string
          - 'null'
        walletId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
    SignedTransaction:
      oneOf:
      - type: object
        title: Signed Solana transaction
        required:
        - transaction
        - signature
        - kind
        properties:
          kind:
            type: string
            enum:
            - SOLANA
          signature:
            type: string
            description: Base64UrlSafeEncoded signature, if applicable
            example: base64UrlSafeEncodedSignature
          transaction:
            type: string
            example: base64UrlSafeEncodedTransaction
      - type: object
        title: Signed Ethereum transaction
        required:
        - transaction
        - signature
        - kind
        properties:
          kind:
            type: string
            enum:
            - ETHEREUM
          signature:
            type: string
            example: 0xSignatureHex
          transaction:
            type: string
            example: 0xSignedTransactionHex
      - type: object
        title: Signed Bitcoin transaction
        required:
        - transaction
        - kind
        properties:
          kind:
            type: string
            enum:
            - BITCOIN
          transaction:
            type: string
            example: base64UrlSafeEncodedPSBT
    SignerPolicyRule:
      oneOf:
      - allOf:
        - $ref: '#/components/schemas/NoSignerAccountUsage'
        - type: object
          required:
          - rule
          properties:
            rule:
              type: string
              enum:
              - NoSignerAccountUsage
      - allOf:
        - $ref: '#/components/schemas/BundleSizeLimit'
        - type: object
          required:
          - rule
          properties:
            rule:
              type: string
              enum:
              - BundleSizeLimit
      - allOf:
        - $ref: '#/components/schemas/ComputeBudgetLimit'
        - type: object
          required:
          - rule
          properties:
            rule:
              type: string
              enum:
              - ComputeBudgetLimit
      - allOf:
        - $ref: '#/components/schemas/NoAddressLookupTables'
        - type: object
          required:
          - rule
          properties:
            rule:
              type: string
              enum:
              - NoAddressLookupTables
      - allOf:
        - $ref: '#/components/schemas/InstructionAllowlist'
        - type: object
          required:
          - rule
          properties:
            rule:
              type: string
              enum:
              - InstructionAllowlist
      - allOf:
        - $ref: '#/components/schemas/ReverseRule_InstructionAllowlist'
        - type: object
          required:
          - rule
          properties:
            rule:
              type: string
              enum:
              - InstructionDenylist
      - type: object
        required:
        - rule
        properties:
          rule:
            type: string
            enum:
            - AllowAll
    SolanaSignerPolicy:
      type: object
      required:
      - rules
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/SignerPolicyRule'
      additionalProperties: false
    TransactionPolicyV0:
      type: object
      properties:
        solana:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/SolanaSignerPolicy'
    TransferOrganizationWalletRequest:
      type: object
      required:
      - ownerOrganizationId
      - targetOrganizationId
      - walletId
      properties:
        ownerOrganizationId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        retainPolicy:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/VersionedOrganizationPolicy'
            description: If set, the owner organization policy will retain access to the wallet with this policy after the transfer.
        targetOrganizationId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        walletId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
    UnsignedTransaction:
      oneOf:
      - type: string
        example: base64UrlSafeEncodedTransaction
      - $ref: '#/components/schemas/EthereumTransaction'
      - $ref: '#/components/schemas/BitcoinTransaction'
    UpdateAuthenticatorRequest:
      type: object
      required:
      - organizationId
      - username
      - authenticatorId
      - authenticator
      properties:
        authenticator:
          $ref: '#/components/schemas/UpdatePartialKmsAuthenticator'
        authenticatorId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        organizationId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        username:
          type: string
    UpdatePartialKmsAuthenticator:
      type: object
      properties:
        authenticatorName:
          type:
          - string
          - 'null'
          description: New name for the authenticator, if provided. If `None`, the name will not be updated.
          example: API Key Auth
        expiresInMs:
          type:
          - integer
          - 'null'
          format: int64
          description: New expiration time for the authenticator, if provided. If `None`, the description will not be updated.
          minimum: 0
    UpdateUserInOrganizationRequest:
      type: object
      description: |-
        Request to update a user in an organization.
        Supports only changing user policy and traits
      required:
      - organizationId
      - username
      properties:
        addTraits:
          type:
          - object
          - 'null'
          additionalProperties:
            type: string
          propertyNames:
            type: string
        newPolicy:
          oneOf:
          - type: 'null'
          - $ref: '#/components/schemas/UserPolicy'
        organizationId:
          type: string
          example: e5e42136-74b1-49ea-88b8-741c268a6f1a
        removeTraits:
          type:
          - array
          - 'null'
          items:
            type: string
        username:
          type: string
    UsdLimitSettings:
      type: object
      required:
      - usdCentsLimitPerDay
      - memoryAccount
      - memoryId
      - memoryBump
      properties:
        memoryAccount:
          type: string
        memoryBump:
          type: integer
          format: int32
          minimum: 0
        memoryId:
          type: integer
          format: int32
          minimum: 0
        usdCentsLimitPerDay:
          type: integer
          format: int32
          minimum: 0
    UserPolicy:
      oneOf:
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - ROOT
      - allOf:
        - $ref: '#/components/schemas/ExternalCelPolicy'
        - type: object
          required:
          - type
          properties:
            type:
              type: string
              enum:
              - CEL
    VersionedOrganizationPolicy:
      oneOf:
      - allOf:
        - $ref: '#/components/schemas/OrganizationPolicyV0'
        - type: object
          required:
          - version
          properties:
            version:
              type: string
              enum:
              - v0
      - allOf:
        - $ref: '#/components/schemas/OrganizationPolicyV1'
        - type: object
          required:
          - version
          properties:
            version:
              type: string
              enum:
              - v1
    VersionedTransactionPolicy:
      oneOf:
      - allOf:
        - $ref: '#/components/schemas/TransactionPolicyV0'
        - type: object
          required:
          - version
          properties:
            version:
              type: string
              enum:
              - v0
    WalletParameters:
      oneOf:
      - $ref: '#/components/schemas/KeypairWalletParameters'
      - $ref: '#/components/schemas/MnemonicWalletParameters'
